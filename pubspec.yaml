name: tarotscore_v2
description: "Application de gestion de scores de Tarot."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ---------------------------------------------------------------------------
  # Base de données SQLite
  # ---------------------------------------------------------------------------

  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6

  # ---------------------------------------------------------------------------
  # Gestion des chemins
  # ---------------------------------------------------------------------------

  path: ^1.9.1
  path_provider: ^2.1.5

  # ---------------------------------------------------------------------------
  # Sélection de fichiers
  # ---------------------------------------------------------------------------

  file_picker: ^10.3.2

  # ---------------------------------------------------------------------------
  # Génération d'UUID
  # ---------------------------------------------------------------------------

  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/avatars/